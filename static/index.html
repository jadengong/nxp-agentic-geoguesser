<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoGuesser Image Detector</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f4f4f4; display: flex; justify-content: center; padding: 60px 16px; }
    .card { background: white; border-radius: 8px; padding: 32px; width: 100%; max-width: 480px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h1 { font-size: 1.25rem; margin-bottom: 24px; }
    label { display: block; margin-bottom: 8px; font-size: 0.875rem; color: #555; }
    input[type="file"] { display: block; width: 100%; margin-bottom: 16px; }
    #preview { width: 100%; max-height: 240px; object-fit: contain; border-radius: 4px; margin-bottom: 16px; display: none; }
    button { width: 100%; padding: 10px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; }
    button:disabled { background: #93c5fd; cursor: not-allowed; }
    #result { margin-top: 20px; }
    #result h2 { font-size: 0.875rem; color: #555; margin-bottom: 8px; }
    #labels { list-style: none; }
    #labels li { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 4px; padding: 8px 12px; margin-bottom: 6px; font-size: 0.9rem; }
    #error { color: #dc2626; margin-top: 12px; font-size: 0.875rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>GeoGuesser Image Detector</h1>
    <label for="file">Upload a JPG image</label>
    <input type="file" id="file" accept=".jpg,.jpeg,image/jpeg">
    <img id="preview" alt="preview">
    <button id="btn" disabled>Detect</button>
    <div id="result" hidden>
      <h2>Detected labels</h2>
      <ul id="labels"></ul>
    </div>
    <p id="error"></p>
  </div>

  <script>
    const fileInput = document.getElementById('file');
    const preview = document.getElementById('preview');
    const btn = document.getElementById('btn');
    const result = document.getElementById('result');
    const labels = document.getElementById('labels');
    const error = document.getElementById('error');

    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (!file) return;
      preview.src = URL.createObjectURL(file);
      preview.style.display = 'block';
      btn.disabled = false;
      result.hidden = true;
      error.textContent = '';
    });

    btn.addEventListener('click', async () => {
      const file = fileInput.files[0];
      if (!file) return;

      btn.disabled = true;
      btn.textContent = 'Detecting…';
      error.textContent = '';
      result.hidden = true;

      const form = new FormData();
      form.append('file', file);

      try {
        const res = await fetch('/detect', { method: 'POST', body: form });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Unknown error');

        labels.innerHTML = data.labels.length
          ? data.labels.map(l => `<li>${l}</li>`).join('')
          : '<li>No labels detected.</li>';
        result.hidden = false;
      } catch (e) {
        error.textContent = `Error: ${e.message}`;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Detect';
      }
    });
  </script>
</body>
</html>
