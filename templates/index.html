<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoGuesser AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }
    h1 { font-size: 1.8rem; margin-bottom: 0.25rem; }
    .subtitle { color: #94a3b8; margin-bottom: 2rem; font-size: 0.9rem; }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 600px;
    }
    .drop-zone {
      border: 2px dashed #475569;
      border-radius: 8px;
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
      margin-bottom: 1rem;
    }
    .drop-zone:hover, .drop-zone.drag-over { border-color: #60a5fa; }
    .drop-zone input { display: none; }
    .drop-zone label {
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      color: #94a3b8;
    }
    .drop-zone label span.icon { font-size: 2rem; }
    .drop-zone.has-image label.prompt { display: none; }
    .drop-zone .change-image {
      display: none;
      margin-top: 0.5rem;
      font-size: 0.9rem;
      color: #60a5fa;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      width: auto;
    }
    .drop-zone .change-image:hover { text-decoration: underline; }
    .drop-zone.has-image .change-image { display: block; }
    #preview {
      max-width: 100%;
      max-height: 250px;
      border-radius: 6px;
      display: none;
      margin: 0.75rem auto;
    }
    .drop-zone.has-image #preview { display: block; }
    button {
      width: 100%;
      padding: 0.75rem;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover:not(:disabled) { background: #2563eb; }
    button:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
    #status { margin-top: 1rem; text-align: center; color: #94a3b8; font-size: 0.9rem; min-height: 1.2rem; }
    .hint { margin-top: 0.5rem; font-size: 0.8rem; color: #64748b; }
    #result {
      margin-top: 1.5rem;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 1.25rem;
      white-space: pre-wrap;
      line-height: 1.6;
      font-size: 0.95rem;
      display: none;
    }
    #fun-fact-box {
      margin-top: 1rem;
      background: #0f172a;
      border: 1px solid #1d4ed8;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      font-size: 0.9rem;
      line-height: 1.6;
      color: #93c5fd;
      display: none;
    }
    #fun-fact-box .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #3b82f6;
      margin-bottom: 0.4rem;
    }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #475569;
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h1>GeoGuesser AI</h1>
  <p class="subtitle">Upload an image and let the AI guess where it was taken</p>

  <div class="card">
    <div class="drop-zone" id="dropZone">
      <label for="fileInput" class="prompt">
        <span class="icon">🗺️</span>
        <span>Click to select or drag & drop an image</span>
        <span style="font-size:0.8rem; color:#64748b;">JPG, PNG, WEBP</span>
      </label>
      <input type="file" id="fileInput" accept="image/*" />
      <img id="preview" alt="Preview" />
      <button type="button" class="change-image" id="changeImage">Choose a different image</button>
    </div>

    <button id="submitBtn" disabled>Identify Location</button>
    <p class="hint">First analysis may take 30–60 seconds (CLIP + AI). You'll see progress below.</p>
    <div id="status"></div>
    <pre id="result"></pre>
    <div id="fun-fact-box">
      <div class="label">💡 Fun Fact</div>
      <div id="fun-fact-text"></div>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const preview = document.getElementById('preview');
    const submitBtn = document.getElementById('submitBtn');
    const status = document.getElementById('status');
    const result = document.getElementById('result');
    const funFactBox = document.getElementById('fun-fact-box');
    const funFactText = document.getElementById('fun-fact-text');

    let selectedFile = null;

    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', e => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) setFile(file);
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) setFile(fileInput.files[0]);
    });

    function setFile(file) {
      selectedFile = file;
      const url = URL.createObjectURL(file);
      preview.src = url;
      dropZone.classList.add('has-image');
      submitBtn.disabled = false;
      result.style.display = 'none';
      funFactBox.style.display = 'none';
      funFactText.textContent = '';
      status.textContent = '';
    }

    document.getElementById('changeImage').addEventListener('click', e => {
      e.preventDefault();
      fileInput.click();
    });

    async function fetchFunFact(ollamaResult) {
      funFactBox.style.display = 'block';
      funFactText.innerHTML = '<span class="spinner"></span>Fetching fun fact...';
      try {
        const res = await fetch('/fun_fact', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ result: ollamaResult }),
        });
        const data = await res.json();
        if (data.fun_fact) {
          funFactText.textContent = data.fun_fact;
        } else {
          funFactBox.style.display = 'none';
        }
      } catch (err) {
        funFactBox.style.display = 'none';
      }
    }

    submitBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      submitBtn.disabled = true;
      result.style.display = 'block';
      result.textContent = '';
      funFactBox.style.display = 'none';
      funFactText.textContent = '';
      status.innerHTML = '<span class="spinner"></span>Getting visual labels...';

      const formData = new FormData();
      formData.append('file', selectedFile);

      try {
        const res = await fetch('/identify_location_stream', { method: 'POST', body: formData });
        if (!res.ok) throw new Error(`Server error: ${res.status}`);
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';
          for (const line of lines) {
            if (line.startsWith('data: ')) {
              try {
                const data = JSON.parse(line.slice(6));
                if (data.stage === 'clip') {
                  status.innerHTML = '<span class="spinner"></span>Getting visual labels...';
                } else if (data.stage === 'ollama') {
                  status.innerHTML = '<span class="spinner"></span>Identifying location...';
                } else if (data.chunk) {
                  result.textContent += data.chunk;
                  status.textContent = '';
                } else if (data.stage === 'done') {
                  status.textContent = '';
                  await fetchFunFact(result.textContent);
                }
              } catch (_) {}
            }
          }
        }
        if (buffer.startsWith('data: ')) {
          try {
            const data = JSON.parse(buffer.slice(6));
            if (data.chunk) result.textContent += data.chunk;
          } catch (_) {}
        }
        status.textContent = '';
      } catch (err) {
        status.textContent = '⚠️ ' + err.message;
        result.style.display = 'none';
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
